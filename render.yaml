services:
  - type: web
    name: smartlecture
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --workers=1 --threads=2 --timeout=120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: WEB_CONCURRENCY
        value: "1"
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: AUTO_CREATE_DB
        value: "true"
