{% extends "base.html" %}
{% block content %}
<div class="page-wrap">
    <h1 class="page-title">{{ locale.live_demo }}</h1>
    <div class="panel max-w-4xl mx-auto md:p-12">
        <div class="flex flex-col items-center">
            <!-- Microphone Button -->
            <button id="recordBtn" class="relative w-28 h-28 rounded-full bg-gradient-to-r from-purple-600 to-pink-600 flex items-center justify-center shadow-xl transition-all duration-300 hover:scale-105 focus:outline-none focus:ring-2 focus:ring-purple-500">
                <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11a7 7 0 0 1-7 7m0 0a7 7 0 0 1-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 0 1-3-3V5a3 3 0 1 1 6 0v6a3 3 0 0 1-3 3z"/>
                </svg>
                <span class="sr-only">Начать запись</span>
            </button>
            <!-- Status -->
            <div id="statusText" class="mt-4 text-sm font-mono text-purple-400">Idle</div>

            <!-- Control Buttons -->
            <div class="flex flex-wrap justify-center gap-3 mt-6">
                <button id="startBtn" class="btn-premium px-6 py-2 rounded-full transition-all duration-200 hover:scale-105">Start</button>
                <button id="stopBtn" class="btn-outline px-6 py-2 rounded-full transition-all duration-200 disabled:opacity-50" disabled>Stop</button>
                <button id="copyBtn" class="btn-outline px-6 py-2 rounded-full transition-all duration-200">Copy</button>
                <button id="clearBtn" class="btn-outline px-6 py-2 rounded-full transition-all duration-200">Clear</button>
                <button id="downloadTxtBtn" class="btn-outline px-6 py-2 rounded-full transition-all duration-200">TXT</button>
                <button id="downloadPdfBtn" class="btn-outline px-6 py-2 rounded-full transition-all duration-200">PDF</button>
            </div>

            <!-- Language & Stats Row -->
            <div class="flex flex-wrap justify-between items-center w-full mt-8 gap-4">
                <select id="languageSelect" class="input-premium rounded-full px-4 py-1.5 text-sm w-auto">
                    <option value="ru-RU">🇷🇺 Русский</option>
                    <option value="kk-KZ">🇰🇿 Қазақша</option>
                    <option value="en-US">🇺🇸 English</option>
                </select>
                <div class="flex gap-4 text-sm text-gray-300">
                    <span> <span id="wordCount">0</span> слов</span>
                    <span> <span id="timerDisplay">00:00</span></span>
                </div>
            </div>

            <!-- Transcription Area -->
            <div class="mt-6 w-full">
                <div id="transcriptionText" class="bg-black/30 rounded-2xl p-5 min-h-[200px] text-white font-mono text-lg leading-relaxed overflow-y-auto max-h-80">
                    Здесь появится распознанный текст...
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/demo.js') }}"></script>
{% endblock %}
