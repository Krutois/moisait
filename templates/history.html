{% extends "base.html" %}
{% block content %}
<div class="page-wrap">
    <h1 class="page-title">{{ locale.history }}</h1>
    
    <div class="panel mb-6 flex flex-wrap gap-4 justify-between items-center">
        <div class="flex gap-2 flex-1">
            <input type="text" id="searchInput" placeholder="{{ locale.search_placeholder }}" 
                   class="input-premium rounded-full w-full md:w-64">
            <button id="searchBtn" class="glass px-4 py-2 rounded-full hover:bg-white/10 transition">{{ locale.search }}</button>
        </div>
        <select id="langFilter" class="input-premium rounded-full w-full md:w-auto">
            <option value="">{{ locale.all_languages }}</option>
            <option value="ru">Русский</option>
            <option value="kk">Қазақша</option>
            <option value="en">English</option>
        </select>
    </div>
    
    <div id="historyList" class="grid gap-4 max-w-4xl mx-auto">
        <!-- JS will inject -->
    </div>
    
    <div id="pagination" class="flex justify-center gap-2 mt-8">
        <!-- Pagination buttons -->
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/history.js') }}"></script>
{% endblock %}
