{% extends "base.html" %}
{% block title %}SmartLecture - 404{% endblock %}
{% block content %}
<section class="section">
  <div class="container">
    <div style="text-align:center; max-width:760px; margin:0 auto; padding:32px; border-radius:30px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.07);">
      <span class="badge">404</span>
      <h1 style="font-size:clamp(42px,8vw,92px); margin:18px 0 10px;">{{ t('errors.404_title') }}</h1>
      <p style="color:var(--muted); line-height:1.7; margin:0 0 22px;">
        {{ t('errors.404_text') }}
      </p>
      <a href="{{ url_for('main.index') }}" class="btn btn-primary">{{ t('errors.home') }}</a>
    </div>
  </div>
</section>
{% endblock %}
